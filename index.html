        // 1. 페이지 오픈 시 지도 로드 및 첫 추천 실행
        window.onload = function() {
            initMap();
            recommendRestaurants();
        };

        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(baseLat, baseLng),
                level: 3
            };
            map = new kakao.maps.Map(container, options);
            
            // 거점 중심 핀마커 설정
            baseMarker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(baseLat, baseLng),
                map: map
            });
        }

        // 2. 사용자가 버튼으로 거점을 교체할 때 작동하는 함수
        function selectEntrance(entranceName, element) {
            currentEntrance = entranceName;
            baseLat = entranceDB[entranceName].lat;
            baseLng = entranceDB[entranceName].lng;

            // UI 텍스트 및 버튼 스타일 업데이트
            document.getElementById('base-status').innerText = `📍 출발지: ${entranceName}`;
            const buttons = document.querySelectorAll('.btn-entrance');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // 지도 중심 변경 및 마커 재배치
            const moveLatLon = new kakao.maps.LatLng(baseLat, baseLng);
            map.setCenter(moveLatLon);
            baseMarker.setPosition(moveLatLon);

            // 거점 변경 시 즉시 맛집 재연산
            recommendRestaurants();
        }

        // 3. 음식 종류 필터 변경 함수
        function selectCategory(cat, element) {
            selectedCategory = cat;
            const buttons = document.querySelectorAll('.btn-cat');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // 4. 거점 기준 하버사인 직선거리 계산 알고리즘 (단위: 미터)
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3;
            const f1 = lat1 * Math.PI / 180;
            const f2 = lat2 * Math.PI / 180;
            const df = (lat2 - lat1) * Math.PI / 180;
            const dl = (lng2 - lng1) * Math.PI / 180;

            const a = Math.sin(df/2) * Math.sin(df/2) +
                      Math.cos(f1) * Math.cos(f2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }

        // 5. 선택 거점 기반 실시간 동선 매칭 및 카카오 맵 내비게이션 주소 연동
        function recommendRestaurants() {
            const listContainer = document.getElementById('restaurant-list');
            listContainer.innerHTML = ''; 

            // 선택한 입구 좌표 기준으로 거리 계산
            let filtered = restaurantDB.map(store => {
                const distance = getDistance(baseLat, baseLng, store.lat, store.lng);
                return { ...store, dist: Math.round(distance) };
            });

            if (selectedCategory !== '전체') {
                filtered = filtered.filter(store => store.cat === selectedCategory);
            }

            // 최단거리(도보 동선 최적화) 순 정렬
            filtered.sort((a, b) => a.dist - b.dist);

            // 가장 동선이 짧은 상위 3개 식당 필터링
            const top3 = filtered.slice(0, 3);
            
            document.getElementById('result-head-text').innerHTML = `🔥 [${currentEntrance}] 기준 가장 가까운 식당 리스트`;

            if(top3.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; padding: 20px; color: #999;">해당 카테고리의 식당 정보가 존재하지 않습니다.</div>';
                return;
            }

            // 화면에 카드 정보 렌더링 및 카카오맵 길안내 스키마 바인딩
            top3.forEach((store, index) => {
                // 출발지 이름에 '정경대 후문', '고려대 정문' 등 선택된 명칭이 동적으로 전송되어 즉시 내비게이션이 활성화됩니다.
                const naviUrl = `https://map.kakao.com/link/route/${encodeURIComponent(currentEntrance)},${baseLat},${baseLng},${encodeURIComponent(store.name)},${store.lat},${store.lng}`;

                const card = document.createElement('div');
                card.className = 'restaurant-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="res-name">${index + 1}. ${store.name} <small style="font-weight:normal; color:#888; font-size:12px;">(${store.cat})</small></span>
                        <span class="res-dist">🚶 도보 약 ${store.dist}m</span>
                    </div>
                    <span class="res-addr">${store.addr}</span>
                    <span class="res-menu">🍽️ ${store.menu}</span>
                    <span class="res-feat">💡 ${store.feat}</span>
                    <a href="${naviUrl}" target="_blank" class="btn-navi">
                        🗺️ [${currentEntrance}]에서 출발하는 도보 길안내 받기
                    </a>
                `;
                listContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
